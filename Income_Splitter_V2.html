<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Splitter V2</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f4f6;padding:20px;max-width:800px;margin:auto}
.card{background:white;padding:20px;border-radius:20px;margin-bottom:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:10px;font-weight:bold}
input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.note{font-size:12px;color:#666}
.highlight{font-weight:bold;font-size:20px}
.hidden{display:none}
</style>
</head>
<body>
<div class="card">
<h2>Income Splitter V2</h2>

<label>Income Type</label>
<select id="type" onchange="calc()">
<option value="abn">ABN Contractor</option>
<option value="iconnect">iConnect Salary</option>
<option value="taxfree">Tax-Free Income</option>
<option value="reimb">True Reimbursement</option>
</select>

<label>Income Amount</label>
<input type="number" id="income" value="0" oninput="calc()">

<div id="travelWrap">
<label>Travel Fund</label>
<select id="travel" onchange="calc()">
<option value="0">0%</option>
<option value="5" selected>5%</option>
<option value="10">10%</option>
<option value="15">15%</option>
</select>
</div>

<div id="fergWrap">
<label>Ferguson Residence</label>
<select id="ferg" onchange="calc()">
<option value="0" selected>0%</option>
<option value="2.5">2.5%</option>
<option value="5">5%</option>
<option value="7.5">7.5%</option>
<option value="10">10%</option>
</select>
</div>

<div id="taxfreeOptions" class="hidden">
<label>Tax-Free Tax Buffer</label>
<select id="tfTax" onchange="calc()">
<option value="0" selected>0%</option>
<option value="2.5">2.5%</option>
<option value="5">5%</option>
<option value="10">10%</option>
</select>

<label>Tax-Free Car Fund</label>
<select id="tfCar" onchange="calc()">
<option value="0" selected>0%</option>
<option value="5">5%</option>
</select>
</div>
</div>

<div class="card" id="message"></div>

<div class="card">
<div class="row"><span>Church Tithe</span><span id="tithe">$0</span></div>
<div class="row"><span>Tax Buffer</span><span id="tax">$0</span></div>
<div class="row"><span>Car Fund</span><span id="car">$0</span></div>
<div class="row"><span>Emergency Fund</span><span id="emergency">$0</span></div>
<div class="row" id="travelRow"><span>Travel Fund</span><span id="travelAmt">$0</span></div>
<div class="row" id="fergRow"><span>Ferguson Residence</span><span id="fergAmt">$0</span></div>
<div class="row"><span>Total to Up Savers</span><span id="savers">$0</span></div>
<div class="row highlight"><span>Remaining Usable Money</span><span id="remaining">$0</span></div>
</div>

<script>
function money(v){return "$"+Math.round(v).toLocaleString();}
function calc(){
 let income=parseFloat(document.getElementById('income').value)||0;
 let type=document.getElementById('type').value;

 let tithe=0,tax=0,car=0,em=0,travel=0,ferg=0;

 document.getElementById('taxfreeOptions').classList.toggle('hidden',type!=='taxfree');

 if(type==='reimb'){
   document.getElementById('message').innerHTML='This payment has been treated as a genuine reimbursement. No savings allocations have been applied.';
   document.getElementById('travelWrap').style.display='none';
   document.getElementById('fergWrap').style.display='none';
 } else {
   document.getElementById('message').innerHTML='Income allocation calculator.';
   document.getElementById('travelWrap').style.display='block';
   document.getElementById('fergWrap').style.display='block';
 }

 if(type==='abn'){
   tithe=income*0.10;
   tax=income*(income>=1500?0.30:income>=800?0.28:0.25);
   car=income*0.05;
   em=income<300?10:income<800?40:75;
 }
 if(type==='iconnect'){
   tithe=income*0.10;
   tax=income*0.05;
   car=income*0.05;
   em=income*0.05;
 }
 if(type==='taxfree'){
   tithe=income*0.10;
   tax=income*(parseFloat(document.getElementById('tfTax').value)/100);
   car=income*(parseFloat(document.getElementById('tfCar').value)/100);
   em=income*0.05;
 }
 if(type!=='reimb'){
   travel=income*(parseFloat(document.getElementById('travel').value)/100);
   ferg=income*(parseFloat(document.getElementById('ferg').value)/100);
 }
 let savers=tax+car+em+travel;
 let remaining=income-tithe-tax-car-em-travel-ferg;

 document.getElementById('tithe').textContent=money(tithe);
 document.getElementById('tax').textContent=money(tax);
 document.getElementById('car').textContent=money(car);
 document.getElementById('emergency').textContent=money(em);
 document.getElementById('travelAmt').textContent=money(travel);
 document.getElementById('fergAmt').textContent=money(ferg);
 document.getElementById('savers').textContent=money(savers);
 document.getElementById('remaining').textContent=money(remaining);

 document.getElementById('travelRow').style.display=(type==='reimb')?'none':'flex';
 document.getElementById('fergRow').style.display=(type==='reimb'||ferg===0)?'none':'flex';
}
calc();
</script>
</body>
</html>
